<section class="industries-section">
  <div class="container">
    <header class="section-header">
      <h2 class="section-title">Industries We've <span class="highlight">Worked With</span></h2>
    </header>

    <div class="industries-grid">
      @for (item of industries(); track item.name) {
        <div class="industry-card">
          <div class="icon-box">
            <app-svg [name]="item.icon" class="item-icon"></app-svg>
          </div>
          <p class="industry-name">{{ item.name }}</p>
        </div>
      }
    </div>
  </div>
</section>

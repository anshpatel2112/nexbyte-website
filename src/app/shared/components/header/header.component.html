<header class="header">
  <div class="header-container">
    <div class="logo-section">
      <div class="logo">
        <img src="/assets/images/main_logo.PNG" alt="Nexbyte Logo">
      </div>
    </div>

    <nav class="nav-links">
      @for (link of navLinks; track link.label) {
      <a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{exact: link.path === '/'}" class="nav-item">{{ link.label }}</a>
      }
      <div class="cta-section">
        <app-button label="Contact Us"></app-button>
      </div>
    </nav>

  </div>
</header>
